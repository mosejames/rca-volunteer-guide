<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCA Volunteer Guide</title>
  <link rel="stylesheet" href="css/guide.css">
</head>
<body>

  <div class="top-bar">
    <span class="top-bar-label">My Group:</span>
    <span class="selected-letters" id="selectedDisplay"></span>
    <span class="sync-status" id="syncStatus">Loading...</span>
    <button class="btn-refresh" id="btnRefresh" aria-label="Refresh">&#x21bb;</button>
    <button class="btn-print" id="btnPrint" aria-label="Print">&#x1F5A8;</button>
  </div>

  <!-- Letter Picker -->
  <div class="letter-picker-wrap">
    <div class="letter-picker-label">Select your assigned group(s)</div>
    <div class="letter-picker" id="letterPicker">
      <button class="letter-btn" data-letter="A">A</button>
      <button class="letter-btn" data-letter="B">B</button>
      <button class="letter-btn" data-letter="C">C</button>
      <button class="letter-btn" data-letter="D">D</button>
      <button class="letter-btn" data-letter="E">E</button>
      <button class="letter-btn" data-letter="F">F</button>
      <button class="letter-btn" data-letter="G">G</button>
      <button class="letter-btn" data-letter="H">H</button>
      <button class="letter-btn" data-letter="I">I</button>
      <button class="letter-btn" data-letter="J">J</button>
      <button class="letter-btn" data-letter="K">K</button>
      <button class="letter-btn" data-letter="L">L</button>
    </div>
    <button class="letter-clear" id="letterClear">Clear</button>
  </div>

  <input type="hidden" id="letterInput">

  <!-- Live Clock & Countdown -->
  <div class="clock-bar" id="clockBar"></div>

  <div id="bannerArea"></div>

  <div class="day-toggle" id="dayToggle" style="display:none;"></div>

  <div class="print-watermark">Do not share with visitors</div>

  <div class="hero-section" id="heroSection"></div>

  <div class="view-toggle" id="viewToggle" style="display:none;">View full timeline</div>

  <div class="lookup-link" id="lookupToggle">Look up any group</div>
  <div class="lookup-panel" id="lookupPanel">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:13px;color:var(--text-secondary);">Where is group</span>
      <input type="text" class="lookup-input" id="lookupInput" maxlength="1" autocapitalize="characters">
      <span style="font-size:13px;color:var(--text-secondary);">right now?</span>
    </div>
    <div class="lookup-result" id="lookupResult"></div>
  </div>

  <div class="timeline" id="timeline" style="display:none;"></div>

  <script type="module" src="js/guide.js"></script>
</body>
</html>
